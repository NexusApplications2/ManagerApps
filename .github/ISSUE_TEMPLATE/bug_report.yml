name: Bug report
description: Reporte um problema reproduzível
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Descrição
      description: Explique o problema de forma objetiva.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Abra ...
        2. Clique ...
        3. Veja o erro ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versão ou commit
      placeholder: v1.0.0 ou hash do commit

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remova tokens, senhas, IDs privados e dados pessoais antes de enviar.
      render: shell
